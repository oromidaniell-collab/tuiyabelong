<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMS | Landlord Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border, #ccc);
            transition: background 0.3s;
        }
        .step-dot.active { background: var(--accent, #4f46e5); }
        .step-dot.done   { background: var(--success, #22c55e); }

        .step-panel { display: none; }
        .step-panel.active { display: block; }

        .access-icon {
            font-size: 3rem;
            color: var(--accent, #4f46e5);
            margin-bottom: 0.5rem;
        }
        .error-msg {
            color: var(--danger, #ef4444);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted, #888);
            cursor: pointer;
        }
        .back-link:hover { color: var(--accent, #4f46e5); }
    </style>
</head>

<body oncontextmenu="return false;">
    <div id="landlord-login-page" class="auth-page">
        <!-- Floating particles -->
        <div class="auth-particles" id="landlord-particles"></div>

        <div class="auth-container">
            <div class="auth-brand">
                <div class="auth-logo">
                    <i class="fas fa-home"></i>
                </div>
                <h1>Landlord Portal</h1>
                <p>Manage your properties with
                    <span class="auth-word-rotator">
                        <span class="word">Efficiency</span>
                        <span class="word">Clarity</span>
                        <span class="word">Ease</span>
                        <span class="word">Control</span>
                    </span>
                </p>
            </div>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot active" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
            </div>

            <!-- Step 1: Secret Access Key -->
            <div class="step-panel active" id="step-1">
                <div class="form-group" style="margin-bottom:0.5rem;">
                    <input type="password" id="landlord-access-key" placeholder="Enter Access Key" autocomplete="off">
                </div>
                <p class="error-msg" id="key-error"> Invalid access key. Please try again.</p>
                <button class="btn-primary btn-block" onclick="verifyLandlordKey()" style="margin-top:1rem;">
                    <i class="fas fa-unlock-alt"></i> Verify Key
                </button>
                <p style="font-size:0.8rem;color:var(--text-muted);margin-top:1rem;">
                    <i class="fas fa-info-circle"></i> Enter the access key provided by the system administrator.
                </p>
            </div>

            <!-- Step 2: Password -->
            <div class="step-panel" id="step-2">
                <div class="form-group" style="margin-bottom:0.5rem;">
                    <input type="password" id="landlord-password" placeholder="Enter Landlord Password" autocomplete="current-password">
                </div>
                <p class="error-msg" id="pass-error"> Incorrect password. Please try again.</p>
                <button class="btn-primary btn-block" onclick="verifyLandlordPassword()" style="margin-top:1rem;">
                    <i class="fas fa-sign-in-alt"></i> Sign In as Landlord
                </button>
                <span class="back-link" onclick="goBackStep()">
                    <i class="fas fa-arrow-left"></i> Back
                </span>
            </div>

            <div class="auth-footer" style="margin-top:1.5rem;">
                <a href="admin-login.html"><i class="fas fa-shield-alt"></i> Admin Portal</a>
            </div>
        </div>
    </div>

    <script>
        // API Base URL configuration
        const API_BASE_URL = (() => {
            const hostname = window.location.hostname;
            const isLocalhost = hostname === 'localhost' || hostname === '127.0.0.1';
            
            if (isLocalhost) {
                // In local development, use port 8001 for landlord backend
                return `http://${hostname}:8001`;
            } else {
                // In production, use same origin
                return window.location.origin;
            }
        })();

        function verifyLandlordKey() {
            const key = document.getElementById('landlord-access-key').value.trim();
            const errEl = document.getElementById('key-error');

            if (!key) {
                errEl.textContent = ' Access key is required.';
                errEl.style.display = 'block';
                return;
            }

            errEl.style.display = 'none';
            // Store key temporarily in session
            sessionStorage.setItem('temp-access-key', key);
            
            // Move to password step
            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.add('active');
            document.getElementById('dot-1').classList.replace('active', 'done');
            document.getElementById('dot-2').classList.add('active');
            document.getElementById('landlord-password').focus();
        }

        async function verifyLandlordPassword() {
            const password = document.getElementById('landlord-password').value;
            const accessKey = sessionStorage.getItem('temp-access-key');
            const errEl = document.getElementById('pass-error');
            const btn = document.querySelector('#step-2 .btn-primary');

            if (!password) {
                errEl.textContent = ' Password is required.';
                errEl.style.display = 'block';
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

                // Call secure backend login endpoint
                const response = await fetch(`${API_BASE_URL}/api/v1/auth/portal-login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        access_key: accessKey,
                        password: password,
                        portal: 'landlord'
                    })
                });

                const data = await response.json();

                if (response.ok && data.access_token) {
                    errEl.style.display = 'none';
                    // Store token securely
                    localStorage.setItem('rms-landlord-token', data.access_token);
                    localStorage.setItem('rms-landlord-role', 'landlord');
                    sessionStorage.removeItem('temp-access-key');
                    
                    // Redirect to landlord portal
                    setTimeout(() => { window.location.href = 'landlord.html'; }, 600);
                } else {
                    errEl.textContent = ` ${data.detail || 'Invalid access key or password.'}`;
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In as Landlord';
                    document.getElementById('landlord-password').value = '';
                    document.getElementById('landlord-password').focus();
                }
            } catch (err) {
                console.error('Login error:', err);
                errEl.textContent = ` Error connecting to server. Ensure backend is running on ${API_BASE_URL}`;
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In as Landlord';
            }
        }

        function goBackStep() {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('dot-2').classList.remove('active');
            document.getElementById('dot-1').classList.replace('done', 'active');
            document.getElementById('pass-error').style.display = 'none';
            document.getElementById('landlord-password').value = '';
            document.getElementById('landlord-access-key').focus();
        }

        // Premium Particles
        function initAuthParticles() {
            const container = document.querySelector('.auth-particles');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 5 + 2;
                p.style.width = `${size}px`;
                p.style.height = `${size}px`;
                p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${Math.random() * 10 + 10}s`;
                p.style.animationDelay = `${Math.random() * 5}s`;
                container.appendChild(p);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initAuthParticles();
            document.getElementById('landlord-access-key').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') verifyLandlordKey();
            });
            document.getElementById('landlord-password').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') verifyLandlordPassword();
            });
        });
    </script>
</body>

</html>
