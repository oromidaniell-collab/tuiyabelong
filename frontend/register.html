<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMS | Create Account</title>
    <link rel="stylesheet" href="style.css?v=1.3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="auth-page">
        <!-- Floating particles -->
        <div class="auth-particles" id="reg-particles"></div>

        <div class="auth-container" style="max-width: 460px;">

            <!-- Form Panel -->
            <div id="form-panel">
                <div class="auth-brand">
                    <div class="auth-logo">
                        <i class="fas fa-building"></i>
                    </div>
                    <h1>Create Account</h1>
                    <p>Start your journey to
                        <span class="auth-word-rotator">
                            <span class="word">Better Living</span>
                            <span class="word">Easy Payments</span>
                            <span class="word">Smart Spaces</span>
                            <span class="word">Peace of Mind</span>
                        </span>
                    </p>
                </div>

                <form id="register-form" onsubmit="handleRegistration(event)" class="auth-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                        <div class="auth-field">
                            <label>First Name</label>
                            <input type="text" id="reg-first" placeholder="John" required>
                        </div>
                        <div class="auth-field">
                            <label>Last Name</label>
                            <input type="text" id="reg-last" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="auth-field">
                        <label>Email Address</label>
                        <input type="email" id="reg-email" placeholder="you@gmail.com" required>
                    </div>
                    <div class="auth-field">
                        <label>Phone Number</label>
                        <input type="text" id="reg-phone" placeholder="0712 345 678" required>
                    </div>
                    <div class="auth-field">
                        <label>Password</label>
                        <input type="password" id="reg-pass" placeholder="Min. 8 characters" required oninput="checkPasswordStrength()">
                        <div id="password-strength" style="margin-top: 0.35rem; font-size: 0.75rem; color: rgba(255,255,255,0.4);"></div>
                    </div>

                    <label style="display:flex; align-items:flex-start; gap:0.6rem; font-size:0.82rem; color:rgba(255,255,255,0.5); text-align:left; cursor:pointer; margin-top:0.25rem;">
                        <input type="checkbox" id="reg-tos" required style="margin-top:0.15rem; flex-shrink:0;">
                        I agree to the <a href="policies.html" target="_blank" style="color:#60a5fa; text-decoration:none;">Terms &amp; Conditions</a>
                    </label>

                    <div id="status-message" class="status-message" style="display: none;"></div>

                    <button type="submit" id="reg-btn" class="btn-primary" style="margin-top: 1rem;">Create Account</button>
                </form>

                <div class="auth-footer" style="margin-top:1.5rem;">
                    <a href="index.html">Already have an account? Sign in</a>
                </div>
            </div>

            <!-- Success Panel -->
            <div id="success-panel" class="success-panel">
                <div class="success-icon">
                    <i class="fas fa-check"></i>
                </div>
                <h3>Account Created!</h3>
                <p>Your account has been created successfully. You can now sign in.</p>
                <a href="index.html" class="auth-btn" style="text-decoration:none; display:block; text-align:center;">
                    Go to Sign In
                </a>
            </div>

        </div>
    </div>

    <script src="app.js?v=1.3"></script>
</body>

</html>
