<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMS | Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border, #ccc);
            transition: background 0.3s;
        }
        .step-dot.active { background: var(--accent, #4f46e5); }
        .step-dot.done   { background: var(--success, #22c55e); }

        .step-panel { display: none; }
        .step-panel.active { display: block; }

        .access-icon {
            font-size: 3rem;
            color: var(--accent, #4f46e5);
            margin-bottom: 0.5rem;
        }
        .error-msg {
            color: var(--danger, #ef4444);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted, #888);
            cursor: pointer;
        }
        .back-link:hover { color: var(--accent, #4f46e5); }
    </style>
</head>

<body oncontextmenu="return false;">
    <div id="admin-login-page" class="auth-page">
        <div class="auth-container">
            <div class="auth-header">
                <i class="fas fa-shield-alt access-icon"></i>
                <h2>Admin Portal</h2>
                <p>Restricted Access — Authorized Personnel Only</p>
            </div>

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot active" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
            </div>

            <!-- Step 1: Email -->
            <div class="step-panel active" id="step-1">
                <div class="form-group" style="margin-bottom:0.5rem;">
                    <input type="email" id="admin-email" placeholder="Enter Email Address" autocomplete="email">
                </div>
                <p class="error-msg" id="email-error"> Invalid email format. Please try again.</p>
                <button class="btn-primary btn-block" onclick="verifyAdminEmail()" style="margin-top:1rem;">
                    <i class="fas fa-arrow-right"></i> Next
                </button>
                <p style="font-size:0.8rem;color:var(--text-muted);margin-top:1rem;">
                    <i class="fas fa-info-circle"></i> Enter your registered email address.
                </p>
            </div>

            <!-- Step 2: Password -->
            <div class="step-panel" id="step-2">
                <div class="form-group" style="margin-bottom:0.5rem;">
                    <input type="password" id="admin-password" placeholder="Enter Password" autocomplete="current-password">
                </div>
                <p class="error-msg" id="pass-error"> Incorrect password. Please try again.</p>
                <button class="btn-primary btn-block" onclick="verifyAdminPassword()" style="margin-top:1rem;">
                    <i class="fas fa-sign-in-alt"></i> Sign In as Admin
                </button>
                <span class="back-link" onclick="goBackStep()">
                    <i class="fas fa-arrow-left"></i> Back
                </span>
            </div>

            <div class="auth-footer" style="margin-top:1.5rem;">
                <a href="landlord-login.html"><i class="fas fa-home"></i> Landlord Portal</a>
            </div>
        </div>
    </div>

    <script>
        // Get API base URL - should be the backend server
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:8002'  // Admin portal on port 8002
            : window.location.origin;  // Same origin in production

        let adminEmail = '';

        async function verifyAdminEmail() {
            const email = document.getElementById('admin-email').value.trim();
            const errEl = document.getElementById('email-error');

            // Basic email validation
            if (!email.includes('@') || !email.includes('.')) {
                errEl.style.display = 'block';
                return;
            }

            errEl.style.display = 'none';
            adminEmail = email;
            
            // Move to password step
            document.getElementById('step-1').classList.remove('active');
            document.getElementById('step-2').classList.add('active');
            document.getElementById('dot-1').classList.replace('active', 'done');
            document.getElementById('dot-2').classList.add('active');
            document.getElementById('admin-password').focus();
        }

        async function verifyAdminPassword() {
            const password = document.getElementById('admin-password').value;
            const errEl = document.getElementById('pass-error');
            const btn = document.querySelector('#step-2 .btn-primary');

            if (!password) {
                errEl.textContent = ' Password is required.';
                errEl.style.display = 'block';
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

                // Call backend login endpoint
                const response = await fetch(`${API_BASE_URL}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `username=${encodeURIComponent(adminEmail)}&password=${encodeURIComponent(password)}`
                });

                const data = await response.json();

                if (response.ok && data.access_token) {
                    errEl.style.display = 'none';
                    // Store token in localStorage
                    localStorage.setItem('rms-admin-token', data.access_token);
                    localStorage.setItem('rms-admin-role', 'admin');
                    localStorage.setItem('rms-admin-email', adminEmail);
                    
                    // Redirect to admin portal
                    setTimeout(() => { window.location.href = 'admin.html'; }, 600);
                } else {
                    errEl.textContent = ` ${data.detail || 'Incorrect email or password. Please try again.'}`;
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In as Admin';
                    document.getElementById('admin-password').value = '';
                    document.getElementById('admin-password').focus();
                }
            } catch (err) {
                console.error('Login error:', err);
                errEl.textContent = ` Error connecting to server. Please ensure the backend is running on ${API_BASE_URL}`;
                errEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In as Admin';
            }
        }

        function goBackStep() {
            document.getElementById('step-2').classList.remove('active');
            document.getElementById('step-1').classList.add('active');
            document.getElementById('dot-2').classList.remove('active');
            document.getElementById('dot-1').classList.replace('done', 'active');
            document.getElementById('pass-error').style.display = 'none';
            document.getElementById('admin-password').value = '';
            document.getElementById('admin-email').focus();
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('admin-email').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') verifyAdminEmail();
            });
            document.getElementById('admin-password').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') verifyAdminPassword();
            });
        });
    </script>
</body>

</html>
